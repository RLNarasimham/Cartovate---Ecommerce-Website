<!doctype html>
<html lang="en" class="h-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %} Cartovate {% endblock %}</title>
    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    
    <style>
      .navbar-brand,
      .nav-link {
        color: white !important;
        font-weight: bold;
      }
      .btn-yellow {
        background: #ffb900;
        color: #000;
        font-weight: bold;
      }
      .product-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        transition: 0.2s;
      }
      .badge-discount {
        background: #388e3c;
        color: white;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body class="d-flex flex-column h-100">
    
    <nav class="navbar navbar-expand-lg shadow bg-success">
      <div class="container">
        <a class="navbar-brand fs-4" href="{% url 'home' %}">
          <img
            src="../../static/images/cartovate_logo.png"
            class="img-fluid d-inline-block align-top"
            style="max-height: 50px; width: auto"
            alt="E-commerce Website Main Logo"
          />
          Cartovate
        </a>

        <button
          class="navbar-toggler btn text-white border-white"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#cartovateNavbar"
          aria-controls="cartovateNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon" style="filter: invert(1)"></span>
        </button>

        <div class="collapse navbar-collapse" id="cartovateNavbar">
          
          <form
            class="d-flex mx-auto w-100 my-2 my-lg-0"
            style="max-width: 50%"
            action="/"
            method="get"
          >
            <input
              class="form-control me-2"
              name="q"
              placeholder="Search for products.."
              value="{{query}}"
            />
            {% if selected_category %}
            <input
              type="hidden"
              name="pr_category"
              value="{{ selected_category }}"
            />
            {% endif %}
            <button class="btn btn-yellow">Search</button>
          </form>

          <ul class="navbar-nav ms-auto">
            {% if user.is_authenticated %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'cart' %}"
                ><button class="btn btn-info">Cart</button></a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'wishlist' %}"
                ><button class="btn btn-info">Wishlist</button></a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'my_orders' %}"
                ><button class="btn btn-info">Orders</button></a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'logout' %}"
                ><button class="btn btn-info">Logout</button></a
              >
            </li>

            {% else %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'login' %}"
                ><button class="btn btn-info">Login</button></a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'register' %}"
                ><button class="btn btn-info">Register</button></a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'password_reset' %}"
                ><button class="btn btn-info">Forgot Password</button></a
              >
            </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid p-0">
      {% for msg in messages %}
      <div
        class="alert alert-{{ msg.tags }} alert-dismissible fade show m-0 rounded-0 py-3"
      >
        <div class="container">
          {{ msg }}
          <button
            class="btn-close"
            type="button"
            data-bs-dismiss="alert"
            aria-label="Close"
          ></button>
        </div>
      </div>
      {% endfor %}
    </div>

    <main class="flex-shrink-0 flex-grow-1">
      <div class="container my-4">{% block content %} {% endblock %}</div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
      <small>2026 Cartovate - The smart way to shop</small>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
