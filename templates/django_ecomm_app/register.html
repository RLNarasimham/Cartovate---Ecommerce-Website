{% extends 'django_ecomm_app/base.html' %} {% block title %}Sign Up
Page-Cartovate{% endblock %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5>Create Account</h5>
      </div>

      <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-warning w-100 fw-bold">Sign Up</button>
        </form>

        <p class="mt-2 text-center">Already have an Account? <a href="{% url 'login' %}"><button class="btn btn-primary">Login</button></a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
